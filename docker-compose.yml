# Synology / docker-compose deployment for the Household Bill Tracker.
#
# Two services:
#   - bill-tracker-api  : FastAPI + SQLite, persists to the `bill_data` volume.
#   - bill-tracker      : nginx serving the React SPA + proxying /api/* to the API.
#
# Usage on the NAS:
#   1. SSH in (or use Container Manager's "Project" UI in DSM 7.2+).
#   2. git clone <your-repo> /volume1/docker/bill-tracker
#   3. cd /volume1/docker/bill-tracker && docker compose up -d --build
#   4. Browse to http://<nas-ip>:8123
#
# Port 8123 is arbitrary — change HOST_PORT below if it clashes with
# Synology Photos, Surveillance Station, or another container.

services:
  bill-tracker-api:
    build: ./backend
    image: bill-tracker-api:latest
    container_name: bill-tracker-api
    restart: unless-stopped
    # No host port published — only the nginx frontend talks to it, via
    # Docker's internal network. Keeps the API off your LAN attack surface.
    volumes:
      - bill_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  bill-tracker:
    build: .
    image: bill-tracker:latest
    container_name: bill-tracker
    restart: unless-stopped
    depends_on:
      bill-tracker-api:
        condition: service_healthy
    ports:
      # host:container — only the left side needs editing for your NAS.
      - "8123:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  bill_data:
    # Named volume so `docker compose down` doesn't nuke your history.
    # On Synology this lives under /volume1/@docker/volumes/<project>_bill_data.
